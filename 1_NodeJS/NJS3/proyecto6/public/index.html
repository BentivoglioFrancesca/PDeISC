<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> Proyecto 6 </title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <h2 class="lab-tag">proyecto 6</h2>
    <p class="subtitle">formulario</p>
  </header>

  <main>

    <!-- este es elñ formulario -->
    <section class="panel panel--form">
      <h3 class="panel-title">Datos personales</h3>

      <form id="regForm" novalidate>

        <!-- texto -->
        <div class="field-group">
          <label for="nombre"> nombre completo <span class="req">*</span></label>
          <input type="text" id="nombre" name="nombre"
                 placeholder="Ej: Juancito Perez"
                 required minlength="3">
          <span class="field-error" id="err-nombre"></span>
        </div>

        <!-- nu8mero -->
        <div class="field-group">
          <label for="edad">Edad <span class="req">*</span></label>
          <input type="number" id="edad" name="edad"
                 placeholder="Ej: 22"
                 required min="1" max="120">
          <span class="field-error" id="err-edad"></span>
        </div>

        <!-- email -->
        <div class="field-group">
          <label for="email">Correo electrónico <span class="req">*</span></label>
          <input type="email" id="email" name="email"
                 placeholder="ejemplo@correo.com"
                 required>
          <span class="field-error" id="err-email"></span>
        </div>

        <!-- select -->
        <div class="field-group">
          <label for="carrera">Carrera <span class="req">*</span></label>
          <select id="carrera" name="carrera" required>
            <option value="">— Seleccioná una opción —</option>
            <option value="Sistemas">Analista en Sistemas</option>
            <option value="Diseño">Diseño Gráfico</option>
            <option value="Administración">Administración</option>
            <option value="Programador">Periodismo</option>
            <option value="Ingeniería">Ingeniería</option>
          </select>
          <span class="field-error" id="err-carrera"></span>
        </div>

        <!-- radio -->
        <div class="field-group">
          <label class="label-block">Turno <span class="req">*</span></label>
          <div class="radio-group">
            <label class="radio-label">
              <input type="radio" name="turno" value="Mañana"> Mañana
            </label>
            <label class="radio-label">
              <input type="radio" name="turno" value="Tarde"> Tarde
            </label>
            <label class="radio-label">
              <input type="radio" name="turno" value="Noche"> Noche
            </label>
          </div>
          <span class="field-error" id="err-turno"></span>
        </div>

        <!-- checkbox -->
        <div class="field-group">
          <label class="label-block">Materias cursando</label>
          <div class="check-group">
            <label class="check-label"><input type="checkbox" name="materias" value="Programación"> Programación</label>
            <label class="check-label"><input type="checkbox" name="materias" value="Base de Datos"> Base de Datos</label>
            <label class="check-label"><input type="checkbox" name="materias" value="Redes"> Redes</label>
            <label class="check-label"><input type="checkbox" name="materias" value="Matemática"> Matemática</label>
          </div>
        </div>

        <div class="form-actions">
          <button type="submit"  class="btn btn--submit">Registrar</button>
          <button type="reset"   class="btn btn--reset">Limpiar</button>
        </div>

      </form>
    </section>

    <!-- RESULTADO DINÁMICO -->
    <section class="panel panel--result" id="resultPanel" hidden>
      <h3 class="panel-title"> ya se registraron los datos </h3>
      <div id="resultContent"></div>
    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
