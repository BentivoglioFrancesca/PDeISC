<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ahorcado</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ── Encabezado ── -->
  <header class="topbar">
    <div class="topbar__brand">
      <h1 class="topbar__title">Ahorcado</h1>
    </div>
    <button class="theme-toggle" id="themeToggle" title="Cambiar tema">
      <span id="themeIcon">☀️</span>
    </button>
  </header>

  <main class="main">

    <!-- ── Panel izquierdo: juego ── -->
    <section class="panel panel--game">

      <!-- Dibujo del ahorcado -->
      <div class="gallows-wrap">
        <svg class="gallows" viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg">
          <!-- Estructura fija -->
          <line x1="20"  y1="210" x2="180" y2="210" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
          <line x1="60"  y1="210" x2="60"  y2="10"  stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
          <line x1="60"  y1="10"  x2="130" y2="10"  stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
          <line x1="130" y1="10"  x2="130" y2="35"  stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
          <!-- Cabeza con cara animada -->
          <g id="p-cabeza" class="parte oculto">
            <circle cx="130" cy="50" r="16" fill="none" stroke="currentColor" stroke-width="3"/>
            <circle id="ojo-i" cx="124" cy="46" r="1.8" fill="currentColor"/>
            <circle id="ojo-d" cx="136" cy="46" r="1.8" fill="currentColor"/>
            <g id="ojos-x" class="oculto">
              <line x1="121" y1="43" x2="127" y2="49" stroke="currentColor" stroke-width="1.6"/>
              <line x1="127" y1="43" x2="121" y2="49" stroke="currentColor" stroke-width="1.6"/>
              <line x1="133" y1="43" x2="139" y2="49" stroke="currentColor" stroke-width="1.6"/>
              <line x1="139" y1="43" x2="133" y2="49" stroke="currentColor" stroke-width="1.6"/>
            </g>
            <path id="boca" d="M123,55 Q130,61 137,55" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </g>
          <!-- Partes del cuerpo (ocultas al inicio) -->
          <line   id="p-cuerpo" x1="130" y1="65"  x2="130" y2="130" stroke="currentColor" stroke-width="3" stroke-linecap="round" class="parte oculto"/>
          <line   id="p-brazo-i" x1="130" y1="80" x2="105" y2="110" stroke="currentColor" stroke-width="3" stroke-linecap="round" class="parte oculto"/>
          <line   id="p-brazo-d" x1="130" y1="80" x2="155" y2="110" stroke="currentColor" stroke-width="3" stroke-linecap="round" class="parte oculto"/>
          <line   id="p-pierna-i" x1="130" y1="130" x2="105" y2="165" stroke="currentColor" stroke-width="3" stroke-linecap="round" class="parte oculto"/>
          <line   id="p-pierna-d" x1="130" y1="130" x2="155" y2="165" stroke="currentColor" stroke-width="3" stroke-linecap="round" class="parte oculto"/>
        </svg>
      </div>

      <!-- Palabra oculta -->
      <div class="word-display" id="wordDisplay"></div>

      <!-- Letras incorrectas -->
      <div class="wrong-wrap">
        <span class="wrong-label">Errores:</span>
        <span class="wrong-letters" id="wrongLetters">—</span>
      </div>

      <!-- Temporizador y puntos -->
      <div class="stats-row">
        <div class="stat-box">
          <span class="stat-label">⏱ Tiempo</span>
          <span class="stat-value" id="timer">0s</span>
        </div>
        <div class="stat-box">
          <span class="stat-label">⭐ Puntos</span>
          <span class="stat-value" id="puntos">0</span>
        </div>
        <div class="stat-box">
          <span class="stat-label">❌ Vidas</span>
          <span class="stat-value" id="vidas">6</span>
        </div>
      </div>

      <!-- Teclado virtual -->
      <div class="keyboard" id="keyboard"></div>

      <!-- Botón nueva partida -->
      <button class="btn btn--primary" id="btnNueva">Nueva partida</button>

    </section>

    <!-- ── Panel derecho: scores ── -->
    <section class="panel panel--scores">

      <h2 class="panel__title">Tabla de posiciones</h2>
      <p class="panel__note" id="scoresNote"></p>

      <div class="table-wrapper">
        <table class="table">
          <thead>
            <tr>
              <th>#</th>
              <th class="th-sort" data-col="nombre">
                Jugador <span class="sort-icon" id="icon-nombre">↕</span>
              </th>
              <th class="th-sort" data-col="puntos">
                Puntos <span class="sort-icon" id="icon-puntos">↓</span>
              </th>
              <th class="th-sort" data-col="tiempo">
                Tiempo <span class="sort-icon" id="icon-tiempo">↕</span>
              </th>
              <th>Fecha</th>
            </tr>
          </thead>
          <tbody id="scoresBody">
            <tr><td colspan="5" class="table__empty">Cargando...</td></tr>
          </tbody>
        </table>
      </div>

      <button class="btn btn--secondary" id="btnDescargarTablaDirecto">Descargar ranking (PDF)</button>

    </section>

  </main>

  <!-- ── Modal: guardar score ── -->
  <div class="modal" id="modalScore">
    <div class="modal__box">
      <h2 class="modal__title" id="modalTitulo">¡Ganaste! </h2>
      <p class="modal__sub" id="modalSub"></p>
      <div class="form__group">
        <label class="form__label" for="inputNombre">Tu nombre</label>
        <input class="form__input" type="text" id="inputNombre" placeholder="Ej: Frann" maxlength="30" />
      </div>
      <p class="form__feedback" id="modalFeedback"></p>
      <div class="modal__actions">
        <button class="btn btn--primary" id="btnGuardar">Guardar score</button>
        <button class="btn btn--secondary" id="btnCerrarModal">Saltar</button>
      </div>
    </div>
  </div>

  <!-- ── Modal: descargar PDF ── -->
  <div class="modal" id="modalPDF">
    <div class="modal__box">
      <h2 class="modal__title">📄 Descargar PDF</h2>
      <p class="modal__sub" id="pdfInfo"></p>
      <div class="modal__actions">
        <button class="btn btn--primary" id="btnDescargarPDF">Mi partida</button>
        <button class="btn btn--primary" id="btnDescargarPDFTabla">Tabla de posiciones</button>
      </div>
      <div class="modal__actions">
        <button class="btn btn--secondary" id="btnCerrarPDF">Cerrar</button>
      </div>
    </div>
  </div>

  <footer class="footer">
    <p>Ahorcado</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
