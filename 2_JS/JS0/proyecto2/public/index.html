<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> POP () </title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <h2 class="lab-tag">proyecto 5</h2>
    <p class="subtitle">método: pop()</p>
  </header>

  <main>

    <!-- EJERCICIO 1 -->
    <section class="panel panel--controls">
      <h3 class="panel-title">Ej 1 — Eliminá el último animal del array</h3>
      <div class="btn-grid">
        <button class="btn btn--action" id="pop1-pop">pop() último animal</button>
        <button class="btn btn--reset" id="pop1-reset">↺ reset</button>
      </div>
    </section>
    <section class="panel panel--stage">
      <h3 class="panel-title">animales[ ]</h3>
      <div class="array-display" id="display-1"></div>
    </section>

    <div class="divider-section"></div>

    <!-- EJERCICIO 2 -->
    <section class="panel panel--controls">
      <h3 class="panel-title">Ej 2 — Quitá el último producto de la lista de compras</h3>
      <div class="btn-grid">
        <button class="btn btn--action" id="pop2-pop">pop() último producto</button>
        <button class="btn btn--reset" id="pop2-reset">↺ reset</button>
      </div>
    </section>
    <section class="panel panel--stage">
      <h3 class="panel-title">compras[ ]</h3>
      <div class="array-display" id="display-2"></div>
    </section>
    <section class="panel panel--eliminado" id="eliminado-panel" style="display:none">
      <h3 class="panel-title">elemento eliminado</h3>
      <div class="eliminado-display" id="eliminado-display"></div>
    </section>

    <div class="divider-section"></div>

    <!-- EJERCICIO 3 -->
    <section class="panel panel--controls">
      <h3 class="panel-title">Ej 3 — Vaciá el array completo con while + pop()</h3>
      <div class="btn-grid">
        <button class="btn btn--action" id="pop3-vaciar">vaciar todo (while + pop)</button>
        <button class="btn btn--reset" id="pop3-reset">↺ reset</button>
      </div>
    </section>
    <section class="panel panel--stage">
      <h3 class="panel-title">items[ ]</h3>
      <div class="array-display" id="display-3"></div>
    </section>

    <!-- LOG -->
    <section class="panel panel--log">
      <h3 class="panel-title">lugar de cambios</h3>
      <ul class="change-log" id="changeLog"></ul>
    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
