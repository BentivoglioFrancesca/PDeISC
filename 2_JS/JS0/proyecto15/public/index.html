<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Codificador Secreto</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="contenedor">

<h1>Codificador de Mensajes Secretos</h1>

<p>
Seleccioná palabras que quieras ocultar.
Se escribirán al revés entre paréntesis.
</p>

<textarea
id="entrada"
placeholder="Escribí un mensaje..."
></textarea>

<div class="botones">
<button onclick="decodificar()">
Decodificar
</button>


<button onclick="limpiar()">
Limpiar
</button>
</div>

<div class="resultado">
<h3>Mensaje codificado</h3>
<p id="salida">---</p>
</div>


</div>

<script src="app.js"></script>

</body>
</html>
