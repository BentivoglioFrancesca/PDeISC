<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> indexOf()</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <h2 class="lab-tag">proyecto 7</h2>
    <p class="subtitle">método: indexOf()</p>
  </header>

  <main>

    <!-- EJERCICIO 1 -->
    <section class="panel panel--controls">
      <h3 class="panel-title">Ej 1 — Encontrar la posición de "perro"</h3>
      <div class="btn-grid">
        <button class="btn btn--action" id="find1">indexOf("perro")</button>
        <button class="btn btn--reset" id="reset1">↺ reset</button>
      </div>
    </section>
    <section class="panel panel--stage">
      <h3 class="panel-title">animales[ ]</h3>
      <div class="array-display" id="display-1"></div>
    </section>
    <section class="panel panel--result" id="result1" style="display:none">
      <h3 class="panel-title">resultado</h3>
      <p class="result-text" id="result-text-1"></p>
    </section>

    <div class="divider-section"></div>

    <!-- EJERCICIO 2 -->
    <section class="panel panel--controls">
      <h3 class="panel-title">Ej 2 — Verificar si el número 50 está en el array</h3>
      <div class="btn-grid">
        <button class="btn btn--action" id="find2">indexOf(50)</button>
        <button class="btn btn--reset" id="reset2">↺ reset</button>
      </div>
    </section>
    <section class="panel panel--stage">
      <h3 class="panel-title">numeros[ ]</h3>
      <div class="array-display" id="display-2"></div>
    </section>
    <section class="panel panel--result" id="result2" style="display:none">
      <h3 class="panel-title">resultado</h3>
      <p class="result-text" id="result-text-2"></p>
    </section>

    <div class="divider-section"></div>

    <!-- EJERCICIO 3 -->
    <section class="panel panel--controls">
      <h3 class="panel-title">Ej 3 — Buscar "Madrid" en el array de ciudades</h3>
      <div class="btn-grid">
        <button class="btn btn--action" id="find3">indexOf("Madrid")</button>
        <button class="btn btn--reset" id="reset3">↺ reset</button>
      </div>
    </section>
    <section class="panel panel--stage">
      <h3 class="panel-title">ciudades[ ]</h3>
      <div class="array-display" id="display-3"></div>
    </section>
    <section class="panel panel--result" id="result3" style="display:none">
      <h3 class="panel-title">resultado</h3>
      <p class="result-text" id="result-text-3"></p>
    </section>

    <!-- LOG -->
    <section class="panel panel--log">
      <h3 class="panel-title">lugar de cambios</h3>
      <ul class="change-log" id="changeLog"></ul>
    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
